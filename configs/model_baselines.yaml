# Model baselines configuration
# Controls: MIL model architectures (ABMIL, CLAM, TransMIL), training hyperparameters
# Related: pipeline.yaml (orchestration), data_pipeline.yaml (embedding input),
#          evaluation.yaml (metrics and splitting)

# Tile-level ResNet50 classifier
tile_classifier:
  backbone: resnet50
  pretrained: true
  num_classes: 2
  dropout: 0.5
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  max_epochs: 50
  patience: 10
  batch_size: 32
  gradient_clip_norm: 1.0
  checkpoint_dir: "checkpoints/tile_classifier"

# Attention-Based Multiple Instance Learning
abmil:
  input_dim: 2048  # ResNet50 feature dimension
  hidden_dim: 256
  attention_dim: 128
  num_classes: 2
  dropout: 0.25
  gated: true  # Use gated attention variant
  learning_rate: 2.0e-4
  weight_decay: 1.0e-4
  max_epochs: 100
  patience: 15
  batch_size: 4
  gradient_clip_norm: 1.0
  checkpoint_dir: "checkpoints/abmil"

# CLAM Single-Branch
clam_sb:
  model_type: clam_sb
  input_dim: 2048
  hidden_dim: 256
  attention_dim: 128
  num_classes: 2
  dropout: 0.25
  inst_cluster: false  # No instance clustering for SB
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  max_epochs: 100
  patience: 15
  batch_size: 4
  gradient_clip_norm: 1.0
  checkpoint_dir: "checkpoints/clam_sb"

# CLAM Multi-Branch
clam_mb:
  model_type: clam_mb
  input_dim: 2048
  hidden_dim: 256
  attention_dim: 128
  num_classes: 2
  num_heads: 3
  dropout: 0.25
  inst_cluster: true  # Enable instance clustering
  inst_lambda: 0.5  # Weight for instance clustering loss
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  max_epochs: 100
  patience: 15
  batch_size: 4
  gradient_clip_norm: 1.0
  checkpoint_dir: "checkpoints/clam_mb"

# Mean pooling baseline (sanity check)
mean_pool:
  classifiers:
    - logistic_regression
    - svm
    - random_forest
  embedding_dim: 2048
  checkpoint_dir: "checkpoints/mean_pool"

# Radiomics-based survival models
radiomics_survival:
  # Feature selection
  feature_selection: "variance"  # Options: variance, lasso, mutual_info
  variance_threshold: 0.01
  n_selected_features: 50

  # Cox Proportional Hazards
  cox:
    penalizer: 0.0
    checkpoint_dir: "checkpoints/cox"

  # Random Survival Forest
  rsf:
    n_estimators: 100
    max_depth: 5
    min_samples_split: 2
    checkpoint_dir: "checkpoints/rsf"

# Data loading
data:
  zarr_path: "data/embeddings.zarr"
  splits_csv: "data/splits.csv"
  max_patches: 2000  # Maximum patches per slide
  sampling_strategy: "all"  # Options: all, random, topk
  num_workers: 4

# Training
training:
  device: "cuda"  # or "cpu"
  seed: 42
  mixed_precision: true  # Use AMP for faster training
  gradient_accumulation_steps: 1
  log_interval: 10  # Log every N batches

# Logging
logging:
  log_dir: "logs"
  save_best_model: true
  save_all_checkpoints: false
  verbose: true

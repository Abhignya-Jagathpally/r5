# Master Pipeline Configuration
# Controls: end-to-end orchestration, stage selection, global training/eval settings
# Related: data_pipeline.yaml (preprocessing), model_baselines.yaml (MIL models),
#          foundation_models.yaml (encoders), evaluation.yaml (metrics/splitting)
# MM Imaging Pathology & Radiomics Surrogate-Genetics Pipeline

pipeline:
  name: mm_imaging_radiomics_pipeline
  version: "0.1.0"
  description: "Multiple Myeloma imaging and radiomics analysis"

# Input/Output directories
data_dir: "./data"
output_dir: "./results"
log_dir: "./logs"

# Pipeline stages to run
stages:
  tiling: true
  stain_norm: true
  dedup: true
  embeddings: true
  radiomics: true
  baselines: true
  foundation: true
  fusion: true
  evaluation: true
  report: true

# Image preprocessing parameters
preprocessing:
  tile_size: 256
  tile_overlap: 0
  tile_format: "npz"  # npz, h5, or zarr
  stain_norm_method: "macenko"  # macenko, reinhard, vahadane, etc.
  dedup_threshold: 0.95  # Threshold for near-duplicate removal
  dedup_method: "ssim"  # ssim or perceptual_hash
  num_workers: 4
  batch_size: 32

# Embedding extraction
embeddings:
  backbone: "uni"  # uni, gigapath, plip, etc.
  checkpoint: null  # Leave null for default pretrained
  batch_size: 32
  layer: "last"  # Which layer to extract from
  pool_method: "mean"  # mean or max pooling
  device: "cuda"
  mixed_precision: true
  cache_embeddings: true

# Radiomics extraction
radiomics:
  image_modality: "ct"  # ct, pet, or mri
  normalize_image: true
  resample_voxel_size: [1.0, 1.0, 1.0]
  features:
    - shape
    - glcm
    - glrlm
    - glszm
    - ngtdm
    - firstorder
  settings:
    binWidth: 25
    interpolator: "sitkBSpline"
    resamplingMethod: "sitkBSpline"

# Data splitting
data_split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  stratify_by: "outcome"  # outcome, site, grade, etc.
  seed: 42
  patient_level: true  # Ensure no patient in multiple sets
  cv_folds: 5

# Baseline models
baseline_models:
  - abmil
  - clam
  - transmil
  - dsmil

baseline_configs:
  abmil:
    hidden_dim: 256
    num_attention_heads: 8
    dropout: 0.25
    learning_rate: 1.0e-4
    weight_decay: 1.0e-5

  clam:
    hidden_dim: 256
    num_classes: 2
    dropout: 0.25
    instance_loss_weight: 0.5
    bag_loss_weight: 0.5

  transmil:
    hidden_dim: 256
    num_layers: 2
    num_heads: 8
    dropout: 0.25

  dsmil:
    hidden_dim: 256
    dropout: 0.25
    instance_pool: "attention"
    bag_pool: "attention"

# Foundation models
foundation_models:
  - uni
  - gigapath

foundation_configs:
  uni:
    pretrained: true
    freeze_backbone: false
    learning_rate: 1.0e-5
    warmup_steps: 100

  gigapath:
    pretrained: true
    freeze_backbone: false
    learning_rate: 1.0e-5
    warmup_steps: 100

# Multimodal fusion
fusion:
  enabled: true
  method: "concat"  # concat, bilinear, gated, cross_attention
  pathology_weight: 0.5
  radiomics_weight: 0.5
  hidden_dim: 256
  dropout: 0.25
  learning_rate: 1.0e-4

# Training configuration
training:
  num_epochs: 50
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  optimizer: "adamw"  # adamw or sgd
  scheduler: "cosine"  # cosine, linear, step
  warmup_epochs: 5
  early_stopping_patience: 10
  early_stopping_metric: "auroc"
  early_stopping_mode: "max"
  gradient_clip: 1.0
  mixed_precision: true
  gradient_accumulation_steps: 1

# Evaluation metrics
evaluation:
  metrics:
    - auroc
    - aupr
    - accuracy
    - sensitivity
    - specificity
    - f1_score
    - precision
    - recall
  calibration: true  # ECE, MCE
  confidence_interval: 0.95
  stratified_analysis: true

# Resource configuration
resources:
  gpu_per_task: 1
  cpu_per_task: 8
  memory_gb: 32
  max_parallel_jobs: 4
  gpu_type: "auto"  # auto, v100, a100, etc.

# Agentic tuning configuration
agentic_tuning:
  enabled: true
  metric: "auroc"  # Metric to optimize
  metric_mode: "max"  # max or min
  budget_type: "trials"  # trials or wall_clock
  max_trials: 50
  max_hours: 24.0
  metric_improvement_threshold: 0.05  # Alert if suspiciously large improvement

  locked_modules:
    - "src/data/*"
    - "src/evaluation/splitter.py"
    - "src/evaluation/preprocessing_contract.py"

  editable_modules:
    - "configs/model_baselines.yaml"
    - "configs/foundation_models.yaml"
    - "configs/fusion_config.yaml"

# Hyperparameter search configuration
hyperparameter_search:
  enabled: true
  scheduler: "asha"  # asha, pbt, fifo
  num_samples: 50
  max_concurrent_trials: 4
  grace_period: 10
  reduction_factor: 3
  search_algorithm: "optuna"  # optuna, random, bayesian
  max_trials: 100
  max_wall_clock_hours: 48.0

# Reproducibility
reproducibility:
  seed: 42
  save_every_n_epochs: 5
  docker: true
  singularity: false
  dvc: true
  environment_snapshot: true
  git_integration: true

# Experiment tracking
experiment_tracking:
  backend: "mlflow"  # mlflow, wandb, tensorboard
  experiment_name: "mm_pipeline"
  tracking_uri: "http://localhost:5000"  # MLflow server
  save_artifacts: true
  log_frequency: 10  # Log metrics every N steps

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null  # null = console only, or path to file

# Advanced options
advanced:
  mixed_precision: true
  distributed_training: false
  compile_model: true  # PyTorch 2.0 torch.compile
  profiling: false
  memory_efficient: true

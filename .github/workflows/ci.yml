name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install black flake8 mypy
      - run: black --check src/ tests/ scripts/ main.py
      - run: flake8 src/ tests/ scripts/ main.py --max-line-length 120 --extend-ignore E203,W503
      - run: mypy src/ --ignore-missing-imports --no-error-summary || true  # advisory for now

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --tb=short -x --timeout=120
        env:
          PYTHONPATH: .
